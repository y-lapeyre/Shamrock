name: Acpp/clang


on:
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:


  shamrock_acpp:
    name: AdaptiveCpp conda ${{ matrix.backend }}:${{matrix.arch}}
    runs-on: ubuntu-latest

    container:
      image: continuumio/anaconda3

    strategy:
      matrix:
        include:
          - backend: omp
            arch: none
            runtest: yes

    defaults:
      run:
        shell: bash -el {0}

    timeout-minutes: 60
    steps:
      #### Checkout part ####
      # Checkout merge commit if PR otherwise default
      - name : Reconfigure git
        run:  |
          git config --global --add safe.directory '*'
          git config --global --list

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request_target'
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Show diff against main
        if: github.event_name == 'pull_request_target'
        run: git diff ${{ github.event.pull_request.base.sha }} HEAD
      #### End Checkout part ####

      - name: Install ccache
        run: |
          apt update
          apt install -y ccache

      - name: Run conda info
        run: conda info

      - name: Setup env
        run : ./env/new-env --machine conda.acpp --builddir build -- --backend ${{ matrix.backend }} --arch ${{ matrix.arch }}

      - name: Source env
        run: |
          cd build
          source ./activate

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-conda-acpp
          verbose: 2

      - name: Configure ccache
        shell: bash
        run: |
          echo " ----- ccache configuration ----- "
          echo " Old configuration: "
          ccache -p
          echo " ----- New configuration:   ----- "
          ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
          ccache -p
          echo " ----- ccache configuration done ----- "

      - name: Show current conda env
        run: |
          cd build
          source ./activate
          conda env export

      - name: Configure
        run: |
          cd build
          source ./activate && shamconfigure

      - name: Configure sham install
        run: |
          cd build
          source ./activate &&  \
            cmake . -DCMAKE_INSTALL_PREFIX=$(pwd)/install_test

      - name: Build & install
        run: |
          cd build
          export NINJA_STATUS="[%f/%t j=%r] "
          source ./activate && shammake install

      - name: Pull reference files
        run: |
          cd build
          source ./activate
          git clone https://github.com/Shamrock-code/reference-files.git

      - name: run Shamrock test suite
        if: matrix.runtest
        run: |
          cd build
          source ./activate
          export SYCLCFG=0:0
          export MPIARGS="--allow-run-as-root --bind-to socket:overload-allowed --oversubscribe"
          ../tools/test_sequence.sh

      - name: Try starting Shamrock (installed version)
        if: matrix.runtest
        run: |
          cd build/install_test/bin
          ls ..
          LD_LIBRARY_PATH=../lib:$LD_LIBRARY_PATH ./shamrock --smi --sycl-cfg 0:0
