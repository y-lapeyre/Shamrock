name: Acpp/clang (Asan)


on:
  workflow_call:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:


jobs:

  shamrock_acpp_omp_asan:
    name: AdaptiveCpp omp asan clang-${{ matrix.clang }}
    runs-on: ubuntu-latest

    container:
      image: ${{ matrix.container }}

    strategy:
      matrix:
        include:
          - clang: 20
            container: ghcr.io/shamrock-code/shamrock-ci:ubuntu22

    #if: false

    timeout-minutes: 120
    steps:
      #### Checkout part ####
      # Checkout merge commit if PR otherwise default
      - name : Reconfigure git
        run:  |
          git config --global --add safe.directory '*'
          git config --global --list
      - uses: actions/checkout@v4
        if: github.event_name == 'pull_request_target'
        with:
          fetch-depth: 0
          submodules: recursive
          ref: "refs/pull/${{ github.event.number }}/merge"

      - uses: actions/checkout@v4
        if: github.event_name != 'pull_request_target'
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Show diff against main
        if: github.event_name == 'pull_request_target'
        run: git diff ${{ github.event.pull_request.base.sha }} HEAD
      #### End Checkout part ####

      - name: ls local
        run : ls -la

      - name: install LLVM
        run: |
          echo "APT::Acquire::Retries \"10\";" | sudo tee -a /etc/apt/apt.conf.d/80-retries
          sudo apt update && \
          ./tools/apt_install_llvm.sh ${{matrix.clang}}

      - uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ github.job }}-asan-acpp
          verbose: 2

      - name: Configure ccache
        shell: bash
        run: |
          echo " ----- ccache configuration ----- "
          echo " Old configuration: "
          ccache -p
          echo " ----- New configuration:   ----- "
          ccache -o compiler_check='%compiler% -dumpmachine; %compiler% -dumpversion'
          ccache -p
          echo " ----- ccache configuration done ----- "


      - name: configure Shamrock
        run: |
          ./env/new-env --machine debian-generic.acpp --builddir build --type asan -- --backend omp

      - name: Configure
        shell: bash # In docker container github action default to sh
        run: |
          cd build
          source ./activate && shamconfigure

      - name: Build
        shell: bash # In docker container github action default to sh
        run: |
          cd build
          export NINJA_STATUS="[%f/%t j=%r] "
          source ./activate && shammake

      - name: Pull reference files
        run: |
          cd build
          git clone https://github.com/Shamrock-code/reference-files.git

      - name: run Shamrock test suite
        run: |
          cd build
          export SYCLCFG=0:0
          export MPIARGS="--allow-run-as-root --bind-to socket:overload-allowed --oversubscribe"
          export ACPP_VISIBILITY_MASK=omp
          export ASAN_OPTIONS=detect_leaks=0
          ../tools/test_sequence.sh
